$kind: http-request
method: POST
url: '{{base_url}}/api/create-order'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "items": [
        {
          "productId": 1,
          "size": "100g",
          "quantity": 1
        }
      ],
      "customer": {
        "name": "Test User",
        "email": "test@example.com",
        "phone": "9876543210",
        "address": "123 Test Street, Test City"
      }
    }
